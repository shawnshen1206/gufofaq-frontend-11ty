---
layout: layouts/base.html
title: GufoFAQ::登入
permalink: login.html
---
<div class="login-wrapper">
    <div class="login-left">
        <div class="login-box">
            <img src="./images/logo_login.png" alt="GufoFAQ" class="logo">

            <form class="form-group-wrap" id="loginForm">
                <div class="form-group">
                    <div class="label">
                        <label for="email" class="control-label" data-i18n="common.account">帳號</label>
                    </div>
                    <div class="field">
                        <input type="email" id="email" name="email" placeholder="請輸入帳號" data-i18n-placeholder="faq.enterAccount" class="form-control input" required autocomplete="email">
                        <span class="error-prompt" id="emailError"></span>
                    </div>
                </div>
                <div class="form-group">
                    <div class="label">
                        <label for="password" class="control-label" data-i18n="common.password">密碼</label>
                    </div>
                    <div class="field">
                        <input type="password" id="password" name="password" placeholder="請輸入密碼" data-i18n-placeholder="faq.enterPassword" class="form-control input" required autocomplete="current-password">
                        <span class="error-prompt" id="passwordError"></span>
                    </div>
                </div>

                <button type="button" class="forgot-btn" id="forgotBtn" onclick="openModal('passwordModal')" data-i18n="faq.forgotPassword">忘記密碼？</button>

                <button type="submit" class="button button-primary login-btn" data-i18n="faq.login">登入</button>
            </form>
        </div>

    </div>

    <div class="login-right">
        <img src="./images/img_login.png" alt="" class="side-img">
    </div>
</div>

<!-- 忘記密碼 modal -->
<dialog class="modals" id="passwordModal">
    <div class="modals-dialog modals-md">
        <div class="modals-wrap">
            <button type="button" class="modals-close btn-close-modals" title="關閉" data-i18n-title="action.close">
                <img src="./images/icon_close_blue.png" alt="">
                <span class="sr-only" data-i18n="action.close">關閉</span>
            </button>
            <div class="modals-content">
                <div class="modals-header">
                    <h3 class="modals-title" data-i18n="faq.forgotPasswordTitle">忘記密碼</h3>
                </div>
                <div class="modals-body">
                    <p class="text-center m-0">親愛的使用者您好，如忘記密碼請與平台管理者聯絡。
                        聯絡email：houl.tu@solventosoft.com.tw，謝謝！</p>
                </div>
            </div>
        </div>
    </div>
</dialog>
