<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- no-flash：在套用 CSS 前先定 <html data-theme>（讀 localStorage → 否則跟系統），避免載入白閃。切換行為見 theme-toggle.js -->
    <script>
        (function () {
            try {
                var t = localStorage.getItem("theme");
                if (t !== "dark" && t !== "light") {
                    t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
                }
                document.documentElement.setAttribute("data-theme", t);
                var l = localStorage.getItem("lang");
                document.documentElement.setAttribute("lang", l === "en" ? "en" : "zh-Hant");
            } catch (e) { }
        })();
    </script>
    <title>{{ title }}</title>
    <link rel="shortcut icon" href="./images/favico.ico" type="image/x-icon">
    <link rel="stylesheet" href="./css/main.css">
</head>

<body{% if bodyClass %} class="{{ bodyClass }}"{% endif %}>
    <div class="full-wrap">
        {{ content | safe }}
    </div>

    <div id="toastContainer"></div>

    <script defer src="./js/mobile-nav.js"></script>
    <script defer src="./js/modals.js"></script>
    <script defer src="./js/footer.js"></script>
    <script defer src="./js/checkbox.js"></script>
    <script defer src="./js/accordion.js"></script>
    <script defer src="./js/tab.js"></script>
    <script defer src="./js/pagination.js"></script>
    <script defer src="./js/multi-select.js"></script>
    <script defer src="./js/upload-box.js"></script>
    <script defer src="./js/editable-block.js"></script>
    <script defer src="./js/qa-side-panel.js"></script>
    <script defer src="./js/prompt-edit.js"></script>
    <script defer src="./js/faq-chatroom.js"></script>
    <script defer src="./js/faq-feedback-modal.js"></script>
    <script defer src="./js/toast.js"></script>
    <script defer src="./js/theme-toggle.js"></script>
    <script defer src="./js/lang-toggle.js"></script>
</body>

</html>
