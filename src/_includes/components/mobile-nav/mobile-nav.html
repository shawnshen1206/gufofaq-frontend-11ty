{# menuItems 由 header.html 在 include 本元件前 {% set %}，兩者共用同一份選單資料，這裡不重新宣告 #}
<nav class="mobile-nav" aria-label="行動版選單" data-i18n-aria-label="nav.mobileMenu">
    <div class="overlay"></div>
    <div class="mobile-menu-wrap">
        <ul class="mobile-menu">
            {% for item in menuItems %}
            <li{% if item.hidden %} class="hidden"{% endif %}>
                {% if item.submenu %}
                <a href="#" class="dropdown" title="{{ item.label }}" data-i18n="{{ item.i18nKey }}" data-i18n-title="{{ item.i18nKey }}" aria-haspopup="true" aria-expanded="false">{{ item.label }}</a>
                <ul>
                    {% for sub in item.submenu %}
                    <li{% if sub.hidden %} class="hidden"{% endif %}>
                        <a href="{{ sub.href }}" title="{{ sub.label }}" data-i18n="{{ sub.i18nKey }}" data-i18n-title="{{ sub.i18nKey }}">{{ sub.label }}{% if sub.beta %}<img src="./images/icon_beta.png" width="52" height="28" decoding="async" alt="BETA" class="beta-icon">{% endif %}</a>
                    </li>
                    {% endfor %}
                </ul>
                {% else %}
                <a href="{{ item.href }}"{% if item.class %} class="{{ item.class }}"{% endif %} title="{{ item.title or item.label }}"{% if item.i18nKey %} data-i18n="{{ item.i18nKey }}" data-i18n-title="{{ item.i18nKey }}"{% endif %}>{{ item.label }}</a>
                {% endif %}
            </li>
            {% endfor %}
        </ul>
    </div>
</nav>
