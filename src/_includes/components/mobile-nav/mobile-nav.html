{# menuItems 由 header.html 在 include 本元件前 {% set %}，兩者共用同一份選單資料，這裡不重新宣告 #}
<div class="mobile-nav">
    <div class="overlay"></div>
    <div class="mobile-menu-wrap">
        <ul class="mobile-menu">
            {% for item in menuItems %}
            <li{% if item.hidden %} class="hidden"{% endif %}>
                {% if item.submenu %}
                <a href="#" class="dropdown" title="{{ item.label }}">{{ item.label }}</a>
                <ul>
                    {% for sub in item.submenu %}
                    <li{% if sub.hidden %} class="hidden"{% endif %}>
                        <a href="{{ sub.href }}" title="{{ sub.label }}">{{ sub.label }}{% if sub.beta %}<img src="./images/icon_beta.png" alt="BETA" style="width:26px; vertical-align:middle; margin-left:4px;">{% endif %}</a>
                    </li>
                    {% endfor %}
                </ul>
                {% else %}
                <a href="{{ item.href }}"{% if item.class %} class="{{ item.class }}"{% endif %} title="{{ item.title or item.label }}">{{ item.label }}</a>
                {% endif %}
            </li>
            {% endfor %}
        </ul>
    </div>
</div>
