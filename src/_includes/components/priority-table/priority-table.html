<!-- 意圖判斷表格（5 欄 .default-table.priority-table，class 沿用既有系統）。
     資料由使用頁面在 include 前 set（見 §3-2/§6）：
       rows = [{ category, description, prompt, priority }]
       priority 對應「變更優先級」下拉的選中值（"高優先級"/"中優先級"/"低優先級"/"不使用"，空字串＝未選）；rows 空陣列＝空狀態表。
     可編輯欄位：任務描述 td.edit-cell.description、任務對應提示詞 td.edit-cell.prompt，內容用 div.ellipsis-2 包覆；
     編輯/設定按鈕、textarea 切換屬 main.js 業務邏輯，不在此列。
     用法：component.html（單張示範）、5-2-1_knowledgeRetrieval.html（依高/中/低優先級分組，每組 set rows 後 include）。 -->
<div class="table-container scrollTable">
    <table class="default-table priority-table">
        <colgroup>
            <col style="width: 283px; min-width: 283px;">
            <col style="width: 283px; min-width: 283px;">
            <col style="width: 283px; min-width: 283px;">
            <col style="width: 80px; min-width: 80px;">
            <col style="width: 140px; min-width: 140px;">
        </colgroup>
        <thead>
            <tr>
                <th>分類名稱</th>
                <th>任務描述</th>
                <th>任務對應提示詞</th>
                <th class="text-center">功能</th>
                <th>變更優先級</th>
            </tr>
        </thead>
        <tbody>
            {% for row in rows %}
            <tr>
                <td>{{ row.category }}</td>
                <td class="edit-cell description">
                    <div class="ellipsis-2">{{ row.description }}</div>
                </td>
                <td class="edit-cell prompt">
                    <div class="ellipsis-2">{{ row.prompt }}</div>
                </td>
                <td class="text-center">
                    <button class="button button-edit-save js-edit-btn" title="編輯">
                        <img src="./images/icon_edit_blue.png" alt="" class="icon">
                        <span class="sr-only">編輯</span>
                    </button>
                </td>
                <td>
                    <div class="form-group">
                        <div class="field">
                            <select class="form-control select-sm singleSelect" aria-label="變更優先級">
                                <option></option>
                                <option value="高優先級"{% if row.priority == "高優先級" %} selected{% endif %}>高優先級</option>
                                <option value="中優先級"{% if row.priority == "中優先級" %} selected{% endif %}>中優先級</option>
                                <option value="低優先級"{% if row.priority == "低優先級" %} selected{% endif %}>低優先級</option>
                                <option value="不使用"{% if row.priority == "不使用" %} selected{% endif %}>不使用</option>
                            </select>
                        </div>
                    </div>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
