<!-- 真實 app 頁面未見 .select-btn-wrap 實際引用（僅定義於 component.scss，註解標 // 2-1 對應 qaRecord）；
     範例依 scss 結構（.form-group flex:1 + .button flex-basis:240px）組裝，複用真實系統的模擬 select（見 pages/dataImport/1-1-1_dataImport.html 的 .field.select-wrap）與 ui/button -->
<div class="select-btn-wrap">
    <div class="form-group select-field">
        <div class="field select-wrap">
            <!-- 模擬 select：用真 <button> 而非 div[role=button]，否則 Enter/Space 不會觸發（原生按鈕免費具備） -->
            <button type="button" class="form-control select-md">
                <span class="select-placeholder" data-i18n="comp.pleaseSelectDataset">請選擇資料集</span>
                <span class="select-value hidden"></span>
            </button>
        </div>
    </div>
    <button type="button" class="button button-primary select-submit" data-i18n="action.query">查詢</button>
</div>
