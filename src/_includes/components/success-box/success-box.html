<!-- 展示片段，取自真實 app pages/components/component.html 17 檔案上傳 section 上傳成功通知範例（class 沿用真實系統）。
     父層用 .block.block-lg.corner-md 包覆（.block 樣式由 components/block 提供，已建置）。
     簡化版靜態跳轉：頁面 set successRetryHref（再次上傳）/ successViewHref（查看資料）即直接連到該頁，未設則 "#"。 -->
<div class="block block-lg corner-md success-box">
    <div class="success-message">
        <img src="./images/icon_check_green.png" width="48" height="48" decoding="async" alt="" class="icon">
        <span data-i18n="comp.uploadSuccess">上傳成功</span>
    </div>
    <div class="success-desc">
        <p><span data-i18n="comp.fileNameLabel">檔案名稱：</span>20251119105623_FAQ測試用.xlsx</p>
        <p><span data-i18n="comp.fileSizeLabel">檔案大小：</span>1KB</p>
        <p><span data-i18n="comp.dataTotalLabel">資料總量：</span>90<span data-i18n="comp.recordsUnit">筆</span></p>
    </div>
    <div class="btn-row">
        <a href="{{ successRetryHref or '#' }}" class="button button-border" data-i18n="comp.uploadAgain">再次上傳</a>
        <a href="{{ successViewHref or '#' }}" class="button button-primary" data-i18n="comp.viewData">查看資料</a>
    </div>
</div>
