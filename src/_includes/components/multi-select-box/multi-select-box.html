<!-- 取自真實頁面 pages/dataImport/1-1-4_columnSelect_excel.html「欄位對應」步驟（class 沿用真實系統）。
     真實頁面左右兩欄內容是頁面自身 js/columnSelect_excel.js 在執行期動態產生（.multi-select-box .block:first / :last 內 empty() 後 append()），
     此處依其產生的 markup 結構以 njk set fields + for 靜態化。
     左欄「select.multiSelect」重用 ui/multi-select 既有 class 命名（由已登記的 ui/multi-select/multi-select.js 於 DOMContentLoaded 增強成 tag 多選 UI）；
     左右兩欄的 form-group/label/field 結構沿用 ui/form-control 既有寫法。
     欄位資料由頁面提供（include 前 set fields，見 §3-2/§6），本元件不自帶。 -->
<div class="flex-row gap-40 mobile-column multi-select-box">
    <!-- 左欄：欄位對應 -->
    <div class="block block-lg corner-md">
        <div class="flex-row column gap-24 justify-content-center">
            <div class="flex-row column gap-8">
                <div class="text-lg text-bold text-center" data-i18n="dataImport.columnMapping">欄位對應</div>
                <div class="text-gray text-center" data-i18n="dataImport.selectSourceHint">請選擇欲對應的來源內容</div>
            </div>
            <div class="flex-row column gap-16">
                {% for field in fields %}
                <div class="form-group row mobile-col">
                    <div class="label label-md">
                        <label for="ms-{{ field.key }}" class="control-label" data-i18n="field.{{ field.key }}">{{ field.label }}</label>
                    </div>
                    <div class="field col-12-sm">
                        <select id="ms-{{ field.key }}" class="form-control multiSelect ms-control field-{{ field.key }}" multiple="multiple" data-placeholder="{{ field.placeholder }}">
                            {% for option in field.options %}
                            <option value="{{ option.value }}"{% if option.selected %} selected{% endif %}>{{ option.label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>

    <!-- 右欄：預覽 -->
    <div class="block block-lg corner-md">
        <div class="flex-row column gap-24 justify-content-center">
            <div class="flex-row column gap-8">
                <div class="text-lg text-bold text-center" data-i18n="dataImport.previewTitle">預覽</div>
                <div class="text-gray text-center" data-i18n="dataImport.previewHint">預覽已對應之結果</div>
            </div>
            <div class="flex-row column gap-16">
                {% for field in fields %}
                <div class="form-group row mobile-col">
                    <div class="label label-md">
                        <label for="ms-preview-{{ field.key }}" class="control-label" data-i18n="field.{{ field.key }}">{{ field.label }}</label>
                    </div>
                    <div class="field col-12-sm">
                        <input type="text" id="ms-preview-{{ field.key }}" class="form-control disabled ms-control preview-{{ field.key }}" value="{{ field.preview }}" disabled>
                        {% if field.error %}
                        <span class="error-prompt date-error" style="display: none;" data-i18n="dataImport.formatWarning">此格式可能無法被正確讀取</span>
                        {% endif %}
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</div>
