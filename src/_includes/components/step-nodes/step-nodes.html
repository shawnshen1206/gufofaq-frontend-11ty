{# 步驟進度條（取自真實 app pages/components/component.html 18 步驟 section；真實 app 僅定義 .done 狀態，無 .active）。
     頁面 include 前 set steps（[{ label, done, i18nKey }]，i18nKey 選填、給該步驟的英文翻譯）+ 選填 stepNodesLg（true 加 .lg 大尺寸變體）。資料由頁面提供，本元件不自帶。 #}
<div class="step-nodes">
    {% for step in steps %}
    <div class="step-node{% if stepNodesLg %} lg{% endif %}{% if step.done %} done{% endif %}"{% if step.i18nKey %} data-i18n="{{ step.i18nKey }}"{% endif %}>{{ step.label }}</div>
    {% endfor %}
</div>
