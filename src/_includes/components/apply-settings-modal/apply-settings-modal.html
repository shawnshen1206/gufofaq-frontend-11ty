<!-- 套用正式設定：確認 modal，取自真實 app pages/qaTest/2-2-1_singleTest.html #ProductionSettingsModal（class/id 沿用真實系統）；
     單一測試頁只需二次確認、避免直接覆蓋正式設定；A/B 測試頁的比對版本見 apply-settings-modal-2、無權限版本見 apply-settings-no-permission-modal -->
<dialog class="modals" id="ProductionSettingsModal">
    <div class="modals-dialog modals-md">
        <div class="modals-wrap">
            <button type="button" class="modals-close btn-close-modals" title="關閉">
                <img src="./images/icon_close_blue.png" alt="">
                <span class="sr-only">關閉</span>
            </button>
            <div class="modals-content">
                <div class="modals-header">
                    <h3 class="modals-title">套用為正式設定</h3>
                </div>
                <div class="modals-body">
                    <p class="text-center m-0">確定要將目前的測試設定套用為正式設定嗎？<br>此動作會覆蓋現有的正式設定。</p>
                </div>
                <div class="modals-footer">
                    <div class="button-row center">
                        <button type="button" class="button button-border btn-close-modals">取消</button>
                        <button type="button" class="button button-primary btn-close-modals js-confirm-apply">確認套用</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</dialog>
