{# 意圖判斷啟用 modal，取自真實 app pages/settings/5-2-1_knowledgeRetrieval.html #intentionModal（與 component.html 展示版一致，class/id 沿用真實系統）；
     真實 markup 僅 modals-header + modals-body 提示文字，無 modals-footer 按鈕，僅可用右上角 .modals-close 關閉 #}
<dialog class="modals" id="intentionModal" aria-labelledby="intentionModal-title">
    <div class="modals-dialog modals-md">
        <div class="modals-wrap">
            <button type="button" class="modals-close btn-close-modals" title="關閉" data-i18n-title="action.close">
                <img src="./images/icon_close_blue.png" width="48" height="48" decoding="async" alt="">
                <span class="sr-only" data-i18n="action.close">關閉</span>
            </button>
            <div class="modals-content">
                <div class="modals-header">
                    <h3 class="modals-title" id="intentionModal-title" data-i18n="modals.intentEnableTitle">意圖判斷啟用</h3>
                </div>
                <div class="modals-body">
                    <p class="text-center" data-i18n="modals.intentEnableDesc">親愛的客戶您好，尚有資料夾未設定任務描述，請進行設定否則將不會被列入判斷。</p>
                </div>
            </div>
        </div>
    </div>
</dialog>
