<!-- source-row 子元件：單一參考來源（accordion 兩列一組：摘要列 + detail-row），取自真實頁 pages/qaHistory/4-2_qaHistory_detail.html
     「參考來源」表格內單一列的 markup（class 沿用真實系統）。由 sources-block.html 以 {% for source in sources %} 逐筆 include 產生。
     展開列的標記（accordion-btn / detail-row / accordion-content / accordion-table）沿用 ui/accordion 既有寫法，
     開合互動已由 ui/accordion/accordion.js（掛在 .sources-block 範圍）處理，此處不新增 js。
     欄位：no（序號）/ file（檔案）/ dataset（資料集）/ title（標題）/ time（時間）/ content（內容）/ note1（備註1）/ note2（備註2）/ reference（參考資料） -->
<tr>
    <td>
        <button class="button accordion-btn" title="展開表格">
            <span class="sr-only">展開表格</span>
        </button>
    </td>
    <td>{{ source.no }}</td>
    <td>
        <a href="" class="link-file">{{ source.file }}</a>
    </td>
    <td>{{ source.dataset }}</td>
</tr>

<!-- detail row（隱藏） -->
<tr class="detail-row">
    <td colspan="4" class="detail-cell">
        <!-- 內嵌資料 -->
        <div class="accordion-content">
            <table class="accordion-table">
                <tr>
                    <th>標題</th>
                    <td>{{ source.title }}</td>
                    <th>時間</th>
                    <td>{{ source.time }}</td>
                </tr>
                <tr>
                    <th>內容</th>
                    <td colspan="3">{{ source.content }}</td>
                </tr>
                <tr>
                    <th>備註1</th>
                    <td colspan="3">{{ source.note1 }}</td>
                </tr>
                <tr>
                    <th>備註2</th>
                    <td colspan="3">{{ source.note2 }}</td>
                </tr>
                <tr>
                    <th>參考資料</th>
                    <td colspan="3">{{ source.reference }}</td>
                </tr>
            </table>
        </div>
    </td>
</tr>
