<!-- 取自真實頁 pages/qaHistory/4-2_qaHistory_detail.html「參考來源」區塊（class 沿用真實系統）。
     .sources-block 本身無 scss 規則（外觀來自 .block + .default-table + ui/accordion）；展開/收合互動的根改用 accordion 自有的 .js-accordion（見 ui/accordion，§1 原子解耦）。
     參數（頁面 include 前 set，未給則用預設示範資料，可 standalone 於元件庫呈現）：
       sources：來源列陣列（每筆欄位見 source-row.html）
       sourcesHidden：true 時根加 .hidden（真實頁預設隱藏、等 JS 依載入狀態顯示）
       sourcesInfo / sourcesInfoClass：標題後的說明字與其 class（預設「(挑選規則 16取8…)」/ .sources-info；AB 測試頁用 .js-sources-side「(設定A)」）
       sourcesRating：{ text, icon } 有值時顯示使用者滿意度
       sourcesDetailHref：有值時顯示「檢視詳細內容」連結（前台問答頁用）
     每筆來源列（含展開列）拆到 source-row.html 子元件，for 迴圈 include 逐筆渲染。 -->
<div class="block sources-block js-accordion{% if sourcesHidden %} hidden{% endif %}" style="margin-top: 24px;">
    <div class="flex-row justify-content-between align-items-center flex-wrap gap-8">
        <div>
            <span class="text-lg text-bold">參考來源</span>
            <span class="text-bold text-gray {{ sourcesInfoClass or 'sources-info' }}">{{ sourcesInfo or '(挑選規則 16取8；使用模型：GPT 4o)' }}</span>
        </div>
        <div class="flex-row align-items-center gap-8 flex-wrap">
            <button class="button button-border button-sm js-expand-all">全部展開</button>
            <button class="button button-border button-sm js-collapse-all">全部收合</button>
            {% if sourcesRating %}
            <span class="divider-vertical"></span>
            <div class="flex-row align-items-center gap-2 sources-rating">
                <span>{{ sourcesRating.text }}</span>
                <img src="{{ sourcesRating.icon }}" alt="" class="icon">
            </div>
            {% endif %}
            {% if sourcesDetailHref %}
            <a href="{{ sourcesDetailHref }}" class="button button-border button-sm sources-detail-link">檢視詳細內容</a>
            {% endif %}
        </div>
    </div>

    <div class="table-container scrollTable" style="margin-top: 16px;">
        <table class="default-table no-border">
            <colgroup>
                <col style="width:40px; min-width:40px;">
                <col style="width:272px; min-width:272px;">
                <col style="width: 1fr; min-width: 580px;">
                <col style="width:240px; min-width:240px;">
            </colgroup>
            <thead>
                <tr>
                    <th></th>
                    <th>序號</th>
                    <th>檔案</th>
                    <th>資料集</th>
                </tr>
            </thead>
            <tbody class="sources-tbody">
                {% for source in sources %}
                {% include "components/sources-block/source-row.html" %}
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
