{# 前台 FAQ 回饋 modal（讚/倒讚後開啟，讓人填理由）。沿用 ui/modals 結構；讚/倒讚二選一由 faq-feedback-modal.js 控制。 #}
<dialog class="modals" id="likeModal" aria-labelledby="likeModal-title">
    <div class="modals-dialog modals-md">
        <div class="modals-wrap">
            {% include "ui/modal-close/modal-close.html" %}
            <div class="modals-content">
                <div class="modals-header">
                    <h3 class="modals-title" id="likeModal-title" data-i18n="modals.helpUsImprove">幫助我們改進</h3>
                </div>
                <div class="modals-body">
                    {# §4：浮空 label 給 id、group 掛 aria-labelledby（同 faq-chatroom 的 chip 區做法）——
                         不用 aria-label 複製字面（可及名稱會自動含 (必填)、切語言也不必另掛屬性翻譯） #}
                    <span id="feedbackVoteLabel"><span data-i18n="modals.feedbackHelpful">這個回答對你有幫助嗎？</span><span class="text-red" data-i18n="common.required">(必填)</span></span>
                    <div class="feedback-vote" role="group" aria-labelledby="feedbackVoteLabel">
                        <button type="button" class="feedback-vote-btn like" data-vote="like" aria-pressed="false" data-i18n="modals.like">
                            <span class="feedback-vote-icon"></span>讚
                        </button>
                        <button type="button" class="feedback-vote-btn dislike" data-vote="dislike" aria-pressed="false" data-i18n="modals.dislike">
                            <span class="feedback-vote-icon"></span>倒讚
                        </button>
                    </div>
                    <div class="form-group mt-12">
                        <div class="label">
                            <label for="feedbackText" class="control-label" data-i18n="modals.feedback">意見回饋</label>
                        </div>
                        <div class="field">
                            <textarea class="form-control" id="feedbackText" rows="3" placeholder="請告訴我們原因（選填）" data-i18n-placeholder="modals.feedbackReasonPlaceholder"></textarea>
                            <span class="error-prompt" role="alert" data-i18n="comp.inputError">輸入錯誤！</span>
                        </div>
                    </div>
                </div>
                <div class="modals-footer">
                    <div class="button-row center">
                        <button type="button" class="button button-border btn-close-modals" data-i18n="action.cancel">取消</button>
                        <button type="submit" class="button button-primary btn-close-modals" data-toast="已送出回饋，感謝您！|送出失敗，請稍後再試" data-i18n-data-toast="toast.feedback" data-toast-type="success|error" data-i18n="action.submit">送出</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</dialog>
