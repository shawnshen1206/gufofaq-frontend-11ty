<!-- 生產 markup（由 pages/dataImport/1-1-2_uploadFile_excel.html include；component.html 亦展示一份）。class 沿用真實系統。
     真實 app 上傳完由業務 JS 自動跳到預覽頁（此頁無下一步按鈕，§5 不做）；簡化版靜態跳轉：
     頁面 set uploadNextHref 時，把上傳區改成連結（點放置區＝前進到下一頁），未設維持 div 不跳轉。 -->
{% if uploadNextHref %}
<a href="{{ uploadNextHref }}" class="upload-box">
    <div class="upload-text">
        <div class="upload-message" data-i18n="comp.uploadDropHint">點選或拖曳檔案至該區域上傳</div>
        <div class="upload-desc" data-i18n="comp.uploadDescXlsx">支援上傳xlsx檔案，檔案最大不超過10MB</div>
    </div>
</a>
{% else %}
<div class="upload-box">
    <div class="upload-text">
        <div class="upload-message" data-i18n="comp.uploadDropHint">點選或拖曳檔案至該區域上傳</div>
        <div class="upload-desc" data-i18n="comp.uploadDescXlsx">支援上傳xlsx檔案，檔案最大不超過10MB</div>
    </div>
</div>
{% endif %}
<input type="file" id="fileInput" class="upload-input" accept=".xlsx" hidden />
