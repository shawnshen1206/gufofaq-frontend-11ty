{# ui/multi-select 範例：真實 app（pages/components/component.html 第 823-830 行）的 .multiSelect 用法，
     由 ui/multi-select/multi-select.js 在 DOMContentLoaded 時增強成 tag 多選 UI #}
<div class="form-group row mobile-col">
    <div class="label label-md">
        <label for="demoMultiSelect" class="control-label">多選框</label>
    </div>
    <div class="field col-12-sm">
        {# data-placeholder + data-placeholder-key＝§4-2「資料槽」正典示範（GUIDELINE 引用本元件為例，示範要做全套） #}
        <select id="demoMultiSelect" class="form-control multiSelect" multiple="multiple" data-placeholder="請選擇" data-placeholder-key="common.pleaseSelect">
            <option value="選項一" selected>選項一</option>
            <option value="選項二">選項二</option>
            <option value="選項三" selected>選項三</option>
            <option value="選項四">選項四</option>
        </select>
    </div>
</div>
