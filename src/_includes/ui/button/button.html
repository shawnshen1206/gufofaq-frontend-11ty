<!-- 展示片段，取自真實 app pages/components/component.html 07 按鈕 section（節錄，class 沿用真實系統） -->
<div class="flex-row gap-20">
    <button class="button button-primary">按鈕</button>
    <button class="button button-primary disabled" disabled>按鈕</button>
    <button class="button button-border">按鈕</button>
    <button class="button button-border disabled" disabled>按鈕</button>
    <button class="button button-green">按鈕</button>
    <button class="button button-red">按鈕</button>
    <button class="button button-dark">按鈕</button>
    <button type="button" class="button button-border button-sm">按鈕</button>
    <button class="button button-orange">
        <img src="./images/icon_add_white.png" width="48" height="48" decoding="async" alt="" class="icon">
        開啟新對話
    </button>
    <button class="button button-edit-save js-edit-btn" title="編輯">
        <img src="./images/icon_edit_blue.png" width="48" height="48" decoding="async" alt="" class="icon">
        <span class="sr-only">編輯</span>
    </button>
</div>

<div class="flex-row gap-20">
    <button class="button-icon copy has-tooltip" data-toast="文字已複製!">
        <span class="tooltip">複製</span>
    </button>
    <button class="button-icon watch has-tooltip">
        <span class="tooltip">查看來源</span>
    </button>
    <button type="button" class="button-icon no-bg size-sm delete" title="刪除">
        <span class="sr-only">刪除</span>
    </button>
    <div class="editable-block">
        <button type="button" class="button-icon no-bg size-sm edit edit-icon" title="編輯"><span
                class="sr-only">編輯</span></button>
        <button type="button" class="button-icon no-bg size-sm save save-icon" title="確認"><span
                class="sr-only">確認</span></button>
        <button type="button" class="button-icon no-bg size-sm cancel cancel-icon" title="取消"><span
                class="sr-only">取消</span></button>
    </div>
</div>
