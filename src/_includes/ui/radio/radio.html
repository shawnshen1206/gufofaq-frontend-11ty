{# 展示片段，取自真實 app pages/components/component.html 09 Checkbox&Radio section 的 Radio 部分（節錄，class 沿用真實系統）。
     §4「一組 radio 要報出這組在問什麼」對展示頁同樣成立（component.html 也是會被輔具讀的 dist 頁），
     三組示範各掛 radiogroup + aria-label（示範用途、字面即說明，不進翻譯字典——showcase 整頁豁免 i18n）。 #}
<div class="flex-row flex-wrap gap-20">
    <div class="flex-row gap-20" role="radiogroup" aria-label="一般樣式示範">
        <label class="form-radio">
            <input type="radio" name="radio_sample_1" checked>
            <span>radio1</span>
        </label>
        <label class="form-radio">
            <input type="radio" name="radio_sample_1">
            <span>radio2</span>
        </label>
    </div>
    <div class="flex-row gap-20" role="radiogroup" aria-label="停用樣式示範">
        <label class="form-radio">
            <input type="radio" name="radio_sample_2" checked disabled>
            <span>radio1</span>
        </label>
        <label class="form-radio">
            <input type="radio" name="radio_sample_2" disabled>
            <span>radio2</span>
        </label>
    </div>
    <div class="flex-row gap-20" role="radiogroup" aria-label="外框樣式示範">
        <label class="form-radio border-wrap">
            <input type="radio" name="radio_sample_3" checked>
            <span>radio1</span>
        </label>
        <label class="form-radio border-wrap">
            <input type="radio" name="radio_sample_3">
            <span>radio2</span>
        </label>
    </div>
</div>
