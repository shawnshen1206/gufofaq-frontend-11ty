<!-- 展示片段，取自真實 app pages/components/component.html 07 按鈕 section 內的 tooltip 用法（節錄，class 沿用真實系統） -->
<!-- .tooltip 本身只負責視覺（見 _tooltip.scss）；顯示/隱藏由父層 .button-icon 的 :has(.tooltip):hover 規則驅動（見 ui/button 的 _button.scss），這裡不重複定義、只示範組合用法 -->
<div class="flex-row gap-20">
    <button class="button-icon copy" data-toast="文字已複製!">
        <span class="tooltip">複製</span>
    </button>
    <button class="button-icon watch">
        <span class="tooltip">查看來源</span>
    </button>
</div>
