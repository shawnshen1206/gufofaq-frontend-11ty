{# 跳窗右上角的關閉鈕。無參數 —— 全站 14 個 modal 逐字元相同，故不留任何客製點。
   `.btn-close-modals` 是 ui/modals 的 js hook（點了就關窗，無樣式）。
   叉叉字形由 CSS 遮罩畫（_modal-close.scss），所以這裡沒有 <img>：深色模式免反相。 #}
<button type="button" class="modals-close btn-close-modals" title="關閉" data-i18n-title="action.close">
    <span class="sr-only" data-i18n="action.close">關閉</span>
</button>
