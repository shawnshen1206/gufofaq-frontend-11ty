<!-- 深色／淺色切換鈕：切換 <html data-theme>，寫入 localStorage（行為見 theme-toggle.js）。
     圖示用 inline SVG（currentColor 隨主題變色，無新 PNG 資產）：淺色顯示月亮（點了轉深），深色顯示太陽（點了轉淺）。 -->
<button type="button" class="theme-toggle" aria-label="切換深色／淺色模式" title="切換深色／淺色模式" data-i18n-title="theme.toggle" data-i18n-aria-label="theme.toggle">
    <svg class="theme-toggle-icon icon-moon" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
        <path fill="currentColor"
            d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.91-.11-1.35a5.39 5.39 0 0 1-7.54-7.54C12.91 3.04 12.46 3 12 3z" />
    </svg>
    <svg class="theme-toggle-icon icon-sun" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
        <circle cx="12" cy="12" r="4.2" fill="currentColor" />
        <g stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="12" y1="2" x2="12" y2="4.2" />
            <line x1="12" y1="19.8" x2="12" y2="22" />
            <line x1="2" y1="12" x2="4.2" y2="12" />
            <line x1="19.8" y1="12" x2="22" y2="12" />
            <line x1="4.9" y1="4.9" x2="6.4" y2="6.4" />
            <line x1="17.6" y1="17.6" x2="19.1" y2="19.1" />
            <line x1="4.9" y1="19.1" x2="6.4" y2="17.6" />
            <line x1="17.6" y1="6.4" x2="19.1" y2="4.9" />
        </g>
    </svg>
</button>
